name: Publish package and deploy docs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_tag:
        description: "The Git tag to checkout (e.g., v1.0.0)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-package:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code for release
        if: github.event_name == 'release'
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Checkout for tag validation
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate input tag exists
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags --force  
          TAG="${{ inputs.version_tag }}"
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "ERROR: Tag '$TAG' not found."
            echo "Tip: pick one of these:"
            git tag -l --sort=-v:refname | head -n 20
            exit 1
          fi

      - name: Checkout code for workflow dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.version_tag }}
          persist-credentials: false

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.version_tag }}"
          fi
          # Strip leading 'v' if present
          echo "pkg_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@10

      - name: Install root dependencies
        run: yarn install --ignore-engines

      - name: Install node package dependencies
        run: npm ci
        working-directory: packages/node

      - name: Set package version
        run: npm version --no-git-tag-version "${{ steps.version.outputs.pkg_version }}"
        working-directory: packages/node

      - name: Check if npm version already published
        id: npm_check
        run: |
          if npm view "@swipegames/public-api@${{ steps.version.outputs.pkg_version }}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.pkg_version }} already published to npm, skipping."
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.skip != 'true'
        run: npm publish --provenance --access public
        working-directory: packages/node

      - name: Notify Packagist of update
        run: |
          curl -sf -X POST \
            -H 'Content-Type: application/json' \
            -H 'Authorization: Bearer ${{ secrets.PACKAGIST_USERNAME }}:${{ secrets.PACKAGIST_API_TOKEN }}' \
            'https://packagist.org/api/update-package' \
            -d '{"repository":{"url":"https://github.com/SwipeGames/public-api"}}'

  build:
    needs: publish-package
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout code for release
        if: github.event_name == 'release'
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Checkout for tag validation
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show existing tags (latest first) for tag validation
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags --force
          echo "Latest tags:"
          git tag -l --sort=-v:refname | head -n 20

      - name: Validate input tag exists
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags --force
          TAG="${{ inputs.version_tag }}"
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "ERROR: Tag '$TAG' not found."
            echo "Tip: pick one of these:"
            git tag -l --sort=-v:refname | head -n 20
            exit 1
          fi

      - name: Checkout code for workflow dispatch (build)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.version_tag }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: yarn

      - name: Install dependencies
        run: yarn install

      - name: Build website
        run: yarn build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./build"

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-sdks:
    needs: publish-package
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        repo:
          - integration-sdk-node
          - integration-sdk-go
          - integration-sdk-php
    steps:
      - name: Generate a token
        id: generate-token
        uses: getsentry/action-github-app-token@d4b5da6c5e37703f8c3b3e43abb5705b46e159cc
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Resolve version tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.version_tag }}"
          fi
          # Strip leading 'v' if present
          echo "pkg_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Trigger auto-update workflow
        uses: convictional/trigger-workflow-and-wait@v1.6.5
        with:
          owner: SwipeGames
          repo: ${{ matrix.repo }}
          github_token: ${{ steps.generate-token.outputs.token }}
          workflow_file_name: auto-update.yml
          ref: main
          client_payload: '{"public_api_version": "${{ steps.version.outputs.pkg_version }}"}'
          wait_interval: 15
          propagate_failure: true
