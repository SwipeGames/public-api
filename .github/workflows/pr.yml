name: PR workflow

on:
  pull_request:
    branches:
      - main

jobs:
  pr:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout for tag validation
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from docusaurus.config.ts
        id: current
        shell: bash
        run: |
          set -euo pipefail

          CURRENT="$(node -e '
            const fs = require("fs");
            const s = fs.readFileSync("docusaurus.config.ts", "utf8");
            const m = s.match(/const\s+API_VERSION\s*=\s*"([^"]+)"/);
            if (!m) process.exit(1);
            process.stdout.write(m[1]);
          ')"

          CURRENT="v${CURRENT}"

          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Check if version is different
        shell: bash
        env:
          CURRENT: ${{ steps.current.outputs.current_version }}
        run: |
          set -euo pipefail

          LATEST="$(git tag -l --sort=-v:refname | head -n 1)"

          # Continue only if CURRENT > LATEST (SemVer order)
          HIGHEST="$(printf '%s\n%s\n' "$LATEST" "$CURRENT" | sort -V | tail -n 1)"

          if [ "$HIGHEST" = "$LATEST" ]; then
            echo "::error::Tag in docusaurus.config.ts is the same as the latest tag ${LATEST}. Please bump the version."
            exit 1
          fi

          # Check that sub-module tags don't already exist
          SUBMODULES=(
            "api/v1.0/core/types"
            "api/v1.0/swipegames-integration/types"
          )

          for SUBMOD in "${SUBMODULES[@]}"; do
            SUBTAG="${SUBMOD}/${CURRENT}"
            if git rev-parse -q --verify "refs/tags/$SUBTAG" >/dev/null; then
              echo "::error::Sub-module tag $SUBTAG already exists. Please bump the version."
              exit 1
            fi
          done

          echo "Tag in docusaurus.config.ts is ${CURRENT} and the latest tag is ${LATEST}. Continue workflow."

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: yarn

      - name: Set up Java (for openapi-generator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: yarn install

      - name: Regenerate all generated code
        run: make gen-api gen-docs

      - name: Check generated code is up-to-date
        if: false # TODO: re-enable after fixing Node version mismatch between local and CI
        shell: bash
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Generated code is out of date. Please run 'make gen-api gen-docs' and commit the changes."
            git diff --name-only
            exit 1
          fi

      - name: Install node package dependencies
        run: npm ci
        working-directory: packages/node

      - name: Build node package
        run: npm run build
        working-directory: packages/node

      - name: Build website
        run: yarn build
